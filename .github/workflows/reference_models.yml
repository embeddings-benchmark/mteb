name: Reference Model Coverage Tests

on:
  push:
    branches: [main]
    paths:
      - "mteb/benchmarks/**"
      - "tests/test_benchmarks/test_reference_models.py"
      - ".github/workflows/reference_models.yml"
  pull_request:
    paths:
      - "mteb/benchmarks/**"
      - "tests/test_benchmarks/test_reference_models.py"
      - ".github/workflows/reference_models.yml"
  workflow_dispatch:

jobs:
  reference-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'
          enable-cache: true
          prune-cache: false

      - name: Install FFmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg8
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          make install-for-tests

      - name: Run reference model coverage test
        run: |
          make reference-model-test
