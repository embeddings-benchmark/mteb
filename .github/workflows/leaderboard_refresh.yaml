name: Daily Space Rebuild
on:
  schedule:
    # Runs at midnight Pacific Time (8 AM UTC)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute data refresh stamp
        id: stamp
        run: echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      # DATA_REFRESH busts the layer cache of the data stage in the
      # Dockerfile, so every daily run re-downloads mteb/results,
      # re-splits the frames and re-renders the OG images even when
      # the code is unchanged. Code-only layers (pip install,
      # Playwright/Chromium) still come from the GHA cache.
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            DATA_REFRESH=${{ steps.stamp.outputs.date }}
          tags: |
            ghcr.io/${{ github.repository }}/leaderboard-backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/leaderboard-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Factory Rebuild
        run: |
          curl -X POST \
            "https://huggingface.co/api/spaces/mteb/leaderboard-backend/restart?factory=true" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
