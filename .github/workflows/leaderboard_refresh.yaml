name: Daily Space Rebuild
on:
  schedule:
    # Runs at midnight Pacific Time (8 AM UTC)
    - cron: "0 8 * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image with current SHA exists
        id: image
        run: |
          if docker manifest inspect ghcr.io/${{ github.repository }}/leaderboard:${{ github.sha }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image (if missing)
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/leaderboard:${{ github.sha }}
            ghcr.io/${{ github.repository }}/leaderboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Factory Rebuild
        run: |
          # Mint a short-lived OIDC ID token from GitHub Actions.
          ID_TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://huggingface.co" \
            | jq -r '.value')

          # Exchange the ID token for a short-lived HF token (RFC 8693).
          HF_TOKEN=$(curl -sSf -X POST https://huggingface.co/oauth/token \
            -H "Content-Type: application/json" \
            -d "{
              \"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\",
              \"subject_token_type\": \"urn:ietf:params:oauth:token-type:id_token\",
              \"subject_token\": \"$ID_TOKEN\",
              \"resource\": \"spaces/mteb/leaderboard\"
            }" | jq -r '.access_token')

          curl -sSf -X POST \
            "https://huggingface.co/api/spaces/mteb/leaderboard/restart?factory=true" \
            -H "Authorization: Bearer $HF_TOKEN"
